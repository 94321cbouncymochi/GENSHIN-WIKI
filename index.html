<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wiki Engine Fixed</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0f1a;
  color:white;
}

#layout {
  display:flex;
  height:100vh;
}

#sidebar {
  width:300px;
  background:#111827;
  padding:10px;
  overflow-y:auto;
}

input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  background:#0f172a;
  color:white;
  border:1px solid #333;
  border-radius:6px;
}

.item {
  padding:6px;
  cursor:pointer;
  border-radius:6px;
}

.item:hover { background:#1f2937; }

#content {
  flex:1;
  padding:20px;
  overflow-y:auto;
}

img {
  max-width:100%;
  border-radius:10px;
}

audio {
  width:100%;
}

a { color:#60a5fa; }
</style>
</head>

<body>

<div id="layout">
  <div id="sidebar">
    <input id="search" placeholder="Search..." />
    <div id="tree"></div>
  </div>

  <div id="content">
    <h2 id="title">Wiki</h2>
    <div id="page">Select a page</div>
  </div>
</div>

<script>

const BASE_URL = "https://coolpython53.github.io/GENSHIN-WIKI/";

/* ---------------- SEARCH MOCK ---------------- */
let pages = [];

search.oninput = renderTree;

/* ---------------- LOAD PAGES ---------------- */
async function loadPages(){
  const res = await fetch(BASE_URL + "manifest.json?t=" + Date.now());
  pages = await res.json();
  renderTree();
}

/* ---------------- TREE (simple flat for stability) ---------------- */
function renderTree(){
  tree.innerHTML = "";

  const q = search.value.toLowerCase();

  pages
    .filter(p => p.toLowerCase().includes(q))
    .forEach(p => {
      const div = document.createElement("div");
      div.className = "item";
      div.textContent = p;
      div.onclick = () => loadPage(p);
      tree.appendChild(div);
    });
}

/* ---------------- SAFE ASSET RESOLVER ---------------- */
function resolveAsset(fullPath, file){
  file = file.trim();

  if(file.startsWith("http://") || file.startsWith("https://")){
    return file;
  }

  file = file.split("/").pop();
  fullPath = fullPath.replace(/^pages\//, "");

  return encodeURI(`${BASE_URL}pages/${fullPath}/${file}`);
}

/* ---------------- PAGE LOADER ---------------- */
async function loadPage(fullPath){
  title.innerText = fullPath.split("/").pop();
  page.innerHTML = "Loading...";

  const res = await fetch(`${BASE_URL}pages/${fullPath}/page.md?t=${Date.now()}`);

  if(!res.ok){
    page.innerHTML = "Not found";
    return;
  }

  let text = await res.text();

  text = text.replace(/image::([^\n]+)/g,(m,file)=>{
    const url = resolveAsset(fullPath, file);
    return `<img src="${url}" loading="lazy">`;
  });

  text = text.replace(/mp3::([^\n]+)/g,(m,file)=>{
    const url = resolveAsset(fullPath, file);
    return `
      <audio controls>
        <source src="${url}" type="audio/mpeg">
      </audio>
    `;
  });

  page.innerHTML = marked.parse(text);
}

/* ---------------- START ---------------- */
loadPages();

</script>

</body>
</html>
