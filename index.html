<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Wiki</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="loginBox">
  <h2>Login</h2>

  <input id="email" placeholder="email">
  <input id="password" type="password" placeholder="password">

  <button onclick="login()">Login</button>
  <button onclick="signup()">Signup</button>
</div>

<div id="wiki" style="display:none">

  <h2>Wiki</h2>

  <button onclick="loadPages()">Load Pages</button>
  <button onclick="logout()">Logout</button>

  <div id="pages"></div>

  <h3 id="title"></h3>
  <textarea id="editor"></textarea>

  <button onclick="save()">Save</button>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxPCEBLslQVpHCJAJeal6ao-KuR9VRaaCyfL1FekDG9npiHBXurFzY8kgfFufzMq69yVg/exec";

let user = null;
let currentPage = null;

/* ================= LOGIN ================= */
async function login() {
  const emailVal = document.getElementById("email").value;
  const passVal = document.getElementById("password").value;

  const res = await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      action: "login",
      email: emailVal,
      password: passVal
    })
  });

  const data = await res.json();
  console.log("LOGIN RESPONSE:", data);

  if (data.success) {
    user = data;
    localStorage.setItem("user", JSON.stringify(user));

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("wiki").style.display = "block";

    loadPages();
  } else {
    alert(data.message || "Login failed");
  }
}
/* ================= SIGNUP ================= */
async function signup() {
  const res = await fetch(API, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      action:"signup",
      username:"user",
      email: email.value,
      password: password.value
    })
  });

  alert(await res.text());
}

/* ================= LOAD PAGES ================= */
async function loadPages() {
  const res = await fetch(API, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({action:"listPages"})
  });

  const data = await res.json();

  pages.innerHTML = "";

  data.pages.forEach(p => {
    const div = document.createElement("div");
    div.innerText = p.title;

    div.onclick = () => openPage(p.id);

    pages.appendChild(div);
  });
}

/* ================= OPEN PAGE ================= */
async function openPage(id) {
  currentPage = id;

  const res = await fetch(API, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      action:"getPage",
      id
    })
  });

  const data = await res.json();

  title.innerText = data.page.title;
  editor.value = data.page.content;
}

/* ================= SAVE ================= */
async function save() {
  await fetch(API, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      action:"updatePage",
      id: currentPage,
      content: editor.value,
      editor: user.email
    })
  });

  alert("Saved");
}

/* ================= AUTO LOGIN ================= */
window.onload = () => {
  const saved = localStorage.getItem("user");
  if (saved) {
    user = JSON.parse(saved);

    loginBox.style.display = "none";
    wiki.style.display = "block";

    loadPages();
  }
};

function logout() {
  localStorage.removeItem("user");
  location.reload();
}
</script>

</body>
</html>
