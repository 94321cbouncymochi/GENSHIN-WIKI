<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wiki</title>

<style>
body { font-family: Arial; background:#0b0f1a; color:white; }

#loginBox, #wiki { padding:20px; }

input, textarea {
  width:100%;
  margin:5px 0;
  padding:10px;
}

button {
  margin:5px;
  padding:10px;
}

#debug {
  position:fixed;
  bottom:10px;
  left:10px;
  background:black;
  color:lime;
  padding:10px;
  font-size:12px;
  max-width:90%;
}
</style>
</head>

<body>

<div id="debug">DEBUG: waiting...</div>

<div id="loginBox">
  <h2>Login</h2>
  <input id="email" placeholder="email">
  <input id="password" type="password" placeholder="password">
  <button onclick="login()">Login</button>
  <button onclick="signup()">Signup</button>
</div>

<div id="wiki" style="display:none">
  <h2>Wiki</h2>

  <button onclick="loadPages()">Load Pages</button>
  <button onclick="logout()">Logout</button>

  <div id="pages"></div>

  <h3 id="title"></h3>
  <textarea id="editor"></textarea>

  <button onclick="save()">Save</button>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxPCEBLslQVpHCJAJeal6ao-KuR9VRaaCyfL1FekDG9npiHBXurFzY8kgfFufzMq69yVg/exec";

let user=null;
let current=null;

function log(msg){
  document.getElementById("debug").innerText = msg;
}

/* ================= LOGIN ================= */
async function login() {
  log("testing fetch...");

  try {
    const res = await fetch(API);
    log("fetch succeeded: " + res.status);
  } catch (e) {
    log("FETCH BLOCKED: " + e);
  }
}
/* ================= SIGNUP ================= */
async function signup(){
  const res = await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      action:"signup",
      username:"user",
      email:email.value,
      password:password.value
    })
  });

  log(await res.text());
}

/* ================= LOAD ================= */
async function loadPages(){
  const res = await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({action:"listPages"})
  });

  const data = await res.json();

  pages.innerHTML="";

  data.pages.forEach(p=>{
    const div=document.createElement("div");
    div.innerText=p.title;
    div.onclick=()=>open(p.id,p.title);
    pages.appendChild(div);
  });
}

/* ================= OPEN ================= */
async function open(id,title){
  current=id;

  const res=await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({action:"getPage",id})
  });

  const data=await res.json();

  titleEl.innerText=data.page.title;
  editor.value=data.page.content;
}

/* ================= SAVE ================= */
async function save(){
  await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      action:"updatePage",
      id:current,
      content:editor.value,
      editor:user.email
    })
  });

  log("saved");
}

function logout(){
  localStorage.removeItem("user");
  location.reload();
}
</script>

</body>
</html>
