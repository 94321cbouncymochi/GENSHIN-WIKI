<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wiki System</title>

<style>
body { font-family: Arial; background:#0b0f1a; color:white; }

input, textarea {
  width:100%;
  padding:10px;
  margin:5px 0;
}

button {
  padding:10px;
  margin:5px;
}

#pages div {
  cursor:pointer;
  padding:5px;
  border-bottom:1px solid #333;
}
</style>
</head>

<body>

<div id="loginBox">
  <h2>Login</h2>

  <input id="email" placeholder="email">
  <input id="password" type="password" placeholder="password">

  <button onclick="login()">Login</button>
  <button onclick="signup()">Signup</button>
</div>

<div id="wiki" style="display:none">

  <h2>Wiki</h2>

  <button onclick="loadPages()">Load Pages</button>
  <button onclick="logout()">Logout</button>

  <div id="pages"></div>

  <h3 id="title"></h3>
  <textarea id="editor"></textarea>

  <button onclick="save()">Save</button>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxPCEBLslQVpHCJAJeal6ao-KuR9VRaaCyfL1FekDG9npiHBXurFzY8kgfFufzMq69yVg/exec";

let user = null;
let current = null;

/* ================= LOGIN ================= */
async function login(){
  const res = await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      action:"login",
      email:email.value,
      password:password.value
    })
  });

  const data = await res.json();

  if(data.success){
    user = data;
    localStorage.setItem("user", JSON.stringify(user));

    loginBox.style.display="none";
    wiki.style.display="block";

    loadPages();
  } else {
    alert("Login failed");
  }
}

/* ================= SIGNUP ================= */
async function signup(){
  const res = await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      action:"signup",
      username:"user",
      email:email.value,
      password:password.value
    })
  });

  alert(await res.text());
}

/* ================= LIST ================= */
async function loadPages(){
  const res = await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({action:"listPages"})
  });

  const data = await res.json();

  pages.innerHTML="";

  data.pages.forEach(p=>{
    const div=document.createElement("div");
    div.innerText=p.title;
    div.onclick=()=>openPage(p.id);
    pages.appendChild(div);
  });
}

/* ================= OPEN ================= */
async function openPage(id){
  current = id;

  const res = await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({action:"getPage",id})
  });

  const data = await res.json();

  title.innerText = data.page.title;
  editor.value = data.page.content;
}

/* ================= SAVE ================= */
async function save(){
  await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      action:"updatePage",
      id:current,
      content:editor.value,
      editor:user.email
    })
  });

  alert("Saved");
}

function logout(){
  localStorage.removeItem("user");
  location.reload();
}
</script>

</body>
</html>
