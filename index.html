<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wiki Engine</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0f1a;
  color:white;
}

#layout {
  display:flex;
  height:100vh;
}

#sidebar {
  width:280px;
  background:#111827;
  padding:10px;
  overflow-y:auto;
}

#content {
  flex:1;
  padding:20px;
  overflow-y:auto;
}

input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  box-sizing:border-box;
  background:#0f172a;
  color:white;
  border:1px solid #333;
  border-radius:6px;
}

.page {
  padding:8px;
  cursor:pointer;
  border-bottom:1px solid #222;
}

.page:hover {
  background:#1f2937;
}

img {
  max-width:100%;
  margin:10px 0;
  border-radius:10px;
}

audio {
  width:100%;
  margin:10px 0;
}
</style>
</head>

<body>

<div id="layout">

  <div id="sidebar">
    <input id="search" placeholder="Search pages..." oninput="renderList()" />
    <div id="list"></div>
  </div>

  <div id="content">
    <h2 id="title">Wiki</h2>
    <div id="page">Select a page</div>
  </div>

</div>

<script>

/* ================= CONFIG ================= */
const BASE_URL = "https://coolpython53.github.io/GENSHIN-WIKI/";

/* ================= PAGES ================= */
let pages = [];

/* ================= LOAD ================= */
async function loadPages() {
  try {
    const res = await fetch(BASE_URL + "manifest.json");
    pages = await res.json();
  } catch (e) {
    console.log("Manifest failed:", e);
    pages = [];
  }
  renderList();
}

/* ================= LIST ================= */
function renderList() {
  const q = search.value.toLowerCase();
  list.innerHTML = "";

  pages
    .filter(p => p.toLowerCase().includes(q))
    .forEach(p => {
      const div = document.createElement("div");
      div.className = "page";
      div.innerText = "📄 " + p;
      div.onclick = () => loadPage(p);
      list.appendChild(div);
    });
}

/* ================= LOAD PAGE ================= */
async function loadPage(name) {
  title.innerText = name;
  page.innerHTML = "Loading...";

  const url = `${BASE_URL}pages/${encodeURIComponent(name)}/page.md`;

  console.log("PAGE URL:", url);

  try {
    const res = await fetch(url);

    if (!res.ok) {
      page.innerHTML = `❌ Page failed: ${res.status}`;
      return;
    }

    let text = await res.text();

    text = parseAssets(name, text);

    page.innerHTML = markdown(text);

  } catch (err) {
    console.log(err);
    page.innerHTML = "❌ Network error loading page";
  }
}

/* ================= ASSETS ================= */
function clean(str) {
  return str
    .replace(/\r/g, "")
    .replace(/\n/g, "")
    .trim();
}

function parseAssets(folder, text) {

  text = text.replace(/image::(.*)/g, (m, src) => {
    const file = clean(src);
    const url = `${BASE_URL}pages/${encodeURIComponent(folder)}/${encodeURIComponent(file)}`;

    console.log("IMG URL:", url);

    return `
      <img src="${url}"
        onerror="console.log('IMAGE FAILED:', this.src); this.style.border='3px solid red';">
    `;
  });

  text = text.replace(/mp3::(.*)/g, (m, src) => {
    const file = clean(src);
    const url = `${BASE_URL}pages/${encodeURIComponent(folder)}/${encodeURIComponent(file)}`;

    console.log("AUDIO URL:", url);

    return `
      <audio controls>
        <source src="${url}" type="audio/mpeg">
      </audio>
    `;
  });

  return text;
}

/* ================= MARKDOWN ================= */
function markdown(text) {
  return text
    .replace(/^### (.*)$/gim, "<h3>$1</h3>")
    .replace(/^## (.*)$/gim, "<h2>$1</h2>")
    .replace(/^# (.*)$/gim, "<h1>$1</h1>")
    .replace(/\*\*(.*?)\*\*/gim, "<b>$1</b>")
    .replace(/\n/g, "<br>");
}

/* ================= START ================= */
loadPages();

</script>

</body>
</html>
